<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaSMatchup — Find Your Tech Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --cream:#FAF7F2; --cream-dark:#F0EBE1; --paper:#FFFDF9;
  --ink:#1C1917; --ink-soft:#44403C; --ink-muted:#78716C; --ink-faint:#A8A29E;
  --amber:#D97706; --amber-light:#FDE68A; --amber-pale:#FFFBEB;
  --sage:#4D7C5F; --rust:#C2410C; --blue:#1D4ED8; --blue-pale:#EFF6FF;
  --purple:#6D28D9; --purple-pale:#F5F3FF;
  --border:rgba(28,25,23,0.12); --border-soft:rgba(28,25,23,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:14px 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(250,247,242,0.92);backdrop-filter:blur(12px);border-bottom:1.5px solid var(--border);}
.nav-logo{font-family:'Caveat',cursive;font-weight:700;font-size:24px;cursor:pointer;display:flex;align-items:center;gap:3px;color:var(--ink);}
.logo-dot{width:7px;height:7px;border-radius:50%;background:var(--amber);flex-shrink:0;margin-bottom:2px;}
.nav-links{display:flex;gap:28px;}
.nav-links button{background:none;border:none;color:var(--ink-muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:color .2s;padding:0;}
.nav-links button:hover,.nav-links button.active{color:var(--ink);}
.nav-cta{background:var(--ink);color:var(--cream);border:none;padding:9px 20px;border-radius:6px;font-family:'Caveat',cursive;font-weight:600;font-size:17px;cursor:pointer;transition:all .2s;}
.nav-cta:hover{background:var(--amber);color:var(--ink);}

/* BUTTONS */
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:var(--cream);border:none;padding:13px 28px;border-radius:8px;font-family:'Caveat',cursive;font-weight:600;font-size:19px;cursor:pointer;transition:all .25s;text-decoration:none;box-shadow:3px 3px 0 var(--amber);}
.btn-primary:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--amber);}
.btn-amber{display:inline-flex;align-items:center;gap:8px;background:var(--amber);color:var(--ink);border:none;padding:13px 28px;border-radius:8px;font-family:'Caveat',cursive;font-weight:700;font-size:19px;cursor:pointer;transition:all .25s;box-shadow:3px 3px 0 rgba(28,25,23,.15);}
.btn-amber:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(28,25,23,.2);}
.btn-outline{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--ink);border:1.5px solid var(--ink);padding:10px 22px;border-radius:8px;font-family:'Caveat',cursive;font-weight:600;font-size:17px;cursor:pointer;transition:all .2s;box-shadow:2px 2px 0 var(--amber-light);}
.btn-outline:hover{background:var(--ink);color:var(--cream);box-shadow:none;}
.btn-ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1.5px solid rgba(250,247,242,.25);color:rgba(250,247,242,.75);padding:13px 28px;border-radius:8px;font-family:'Caveat',cursive;font-size:18px;cursor:pointer;transition:all .2s;}
.btn-ghost:hover{border-color:rgba(250,247,242,.5);color:var(--cream);}
.btn-text{background:none;border:none;border-bottom:1px dashed var(--ink-faint);color:var(--ink-soft);font-family:'DM Sans',sans-serif;font-size:14px;padding-bottom:2px;cursor:pointer;transition:color .2s,border-color .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-text:hover{color:var(--ink);border-color:var(--ink);}

/* LAYOUT */
.page{padding-top:64px;min-height:100vh;}
.container{max-width:1160px;margin:0 auto;padding:0 48px;}
.section{padding:72px 0;}
.section-eyebrow{font-family:'Caveat',cursive;font-size:18px;color:var(--amber);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.section-eyebrow::after{content:'';flex:0 0 auto;width:32px;height:1.5px;background:var(--amber-light);}
.section-title{font-family:'Lora',serif;font-size:clamp(24px,3.5vw,36px);font-weight:600;color:var(--ink);letter-spacing:-.3px;margin-bottom:12px;line-height:1.25;}
.section-sub{color:var(--ink-soft);font-size:16px;line-height:1.7;max-width:520px;}

/* HERO */
.hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:100px 64px 60px;gap:48px;max-width:1280px;margin:0 auto;}
.hero-left{padding-right:16px;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:8px;font-family:'Caveat',cursive;font-size:17px;color:var(--ink-soft);margin-bottom:20px;}
.hero-eyebrow-line{width:28px;height:2px;background:var(--amber);border-radius:2px;flex-shrink:0;}
.hero h1{font-family:'Lora',serif;font-size:clamp(34px,4.5vw,56px);font-weight:600;line-height:1.15;letter-spacing:-.5px;color:var(--ink);margin-bottom:20px;}
.hero h1 em{font-style:italic;color:var(--amber);}
.hero-sub{font-size:17px;color:var(--ink-soft);line-height:1.7;margin-bottom:32px;max-width:440px;}
.hero-sub strong{color:var(--ink);font-weight:500;}
.hero-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:40px;}
.hero-trust{display:flex;gap:20px;flex-wrap:wrap;}
.trust-item{display:flex;align-items:center;gap:6px;font-family:'Caveat',cursive;font-size:15px;color:var(--ink-muted);}
.trust-check{width:16px;height:16px;border:1.5px solid var(--sage);border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--sage);font-size:11px;flex-shrink:0;}

/* SKETCH CANVAS */
.hero-right{position:relative;display:flex;align-items:center;justify-content:center;}
.sketch-canvas{width:100%;max-width:500px;background:var(--paper);border:2px solid var(--ink);border-radius:12px;padding:28px;position:relative;box-shadow:6px 6px 0 rgba(28,25,23,.15),0 2px 40px rgba(28,25,23,.06);transform:rotate(.8deg);animation:floatSketch 5s ease-in-out infinite;}
@keyframes floatSketch{0%,100%{transform:rotate(.8deg) translateY(0);}50%{transform:rotate(.8deg) translateY(-6px);}}
.sketch-badge{position:absolute;top:-13px;left:22px;background:var(--amber);color:var(--ink);font-family:'Caveat',cursive;font-weight:700;font-size:14px;padding:3px 12px;border-radius:4px;box-shadow:2px 2px 0 rgba(28,25,23,.2);transform:rotate(-1.5deg);}
.sketch-title{font-family:'Caveat',cursive;font-size:17px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.sketch-subtitle{font-family:'Caveat',cursive;font-size:13px;color:var(--ink-muted);margin-bottom:18px;border-bottom:1px dashed var(--border);padding-bottom:14px;}
.sketch-layer{margin-bottom:10px;}
.sketch-layer-label{font-family:'Caveat',cursive;font-size:12px;color:var(--ink-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:flex;align-items:center;gap:5px;}
.sketch-layer-label::before{content:'';width:12px;height:1.5px;background:var(--ink-faint);display:inline-block;}
.sketch-tools{display:flex;gap:6px;flex-wrap:wrap;}
.sketch-tool{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;font-family:'Caveat',cursive;font-size:14px;font-weight:600;border:1.5px solid;}
.sketch-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.s-crm .sketch-tool{background:#FFF7ED;border-color:#FED7AA;color:#9A3412;}.s-crm .sketch-dot{background:#F97316;}
.s-data .sketch-tool{background:var(--blue-pale);border-color:#BFDBFE;color:#1E40AF;}.s-data .sketch-dot{background:#3B82F6;}
.s-analytics .sketch-tool{background:#F0FDF4;border-color:#BBF7D0;color:#166534;}.s-analytics .sketch-dot{background:#22C55E;}
.s-ops .sketch-tool{background:#FEFCE8;border-color:var(--amber-light);color:#92400E;}.s-ops .sketch-dot{background:#F59E0B;}
.sketch-connector{font-family:'Caveat',cursive;font-size:12px;color:var(--ink-faint);margin:3px 0 3px 8px;}
.sketch-cost{margin-top:14px;padding-top:12px;border-top:1.5px dashed var(--border);display:flex;justify-content:space-between;align-items:center;}
.sketch-cost-label{font-family:'Caveat',cursive;font-size:13px;color:var(--ink-muted);}
.sketch-cost-amount{font-family:'Caveat',cursive;font-size:20px;font-weight:700;color:var(--ink);background:var(--amber-light);padding:2px 10px;border-radius:4px;}
.sketch-deco{position:absolute;font-family:'Caveat',cursive;color:var(--ink-faint);font-size:12px;pointer-events:none;}
.sketch-deco-1{top:-24px;right:36px;transform:rotate(-5deg);}
.sketch-deco-2{bottom:-20px;left:28px;transform:rotate(3deg);}

/* STATS BAR */
.stats-bar{background:var(--ink);padding:20px 64px;display:flex;justify-content:center;gap:60px;align-items:center;flex-wrap:wrap;}
.stat-item{display:flex;align-items:center;gap:12px;}
.stat-num{font-family:'Caveat',cursive;font-size:32px;font-weight:700;color:var(--amber);}
.stat-label{font-size:13px;color:rgba(250,247,242,.6);line-height:1.3;max-width:80px;}
.stat-sep{color:rgba(250,247,242,.15);font-size:22px;}

/* HOW IT WORKS */
.how-section{background:var(--paper);}
.how-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;margin-top:44px;}
.how-card{padding:28px;border:1.5px solid var(--border);border-radius:12px;background:var(--cream);position:relative;transition:all .25s;overflow:hidden;}
.how-card:hover{transform:translateY(-3px);box-shadow:4px 4px 0 var(--amber-light);border-color:var(--amber);}
.how-num{font-family:'Caveat',cursive;font-size:60px;font-weight:700;color:var(--cream-dark);line-height:1;position:absolute;top:12px;right:20px;}
.how-icon{font-size:26px;margin-bottom:14px;display:block;}
.how-card h3{font-family:'Lora',serif;font-size:19px;font-weight:600;margin-bottom:8px;color:var(--ink);line-height:1.3;}
.how-card p{font-size:14px;color:var(--ink-soft);line-height:1.65;}

/* VERTICALS */
.verticals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:40px;}
.vertical-card{background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:32px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.vertical-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--amber-light);transition:background .25s;}
.vertical-card:hover{border-color:var(--amber);box-shadow:3px 3px 0 var(--amber-light);}
.vertical-card:hover::before{background:var(--amber);}
.vertical-card.coming{opacity:.5;cursor:default;}
.vertical-card.coming:hover{border-color:var(--border);box-shadow:none;}
.vertical-card.coming:hover::before{background:var(--amber-light);}
.vc-icon{font-size:30px;margin-bottom:12px;display:block;}
.vc-eyebrow{font-family:'Caveat',cursive;font-size:14px;color:var(--amber);margin-bottom:4px;}
.vc-name{font-family:'Lora',serif;font-size:20px;font-weight:600;margin-bottom:8px;color:var(--ink);}
.vc-desc{font-size:14px;color:var(--ink-soft);line-height:1.6;margin-bottom:14px;}
.vc-tools{display:flex;gap:6px;flex-wrap:wrap;}
.vc-tool{font-family:'Caveat',cursive;font-size:13px;padding:3px 10px;background:var(--cream-dark);border:1.5px solid var(--border);border-radius:100px;color:var(--ink-muted);}
.vc-arrow{position:absolute;top:28px;right:28px;color:var(--ink-faint);font-size:18px;transition:all .25s;}
.vertical-card:hover .vc-arrow{color:var(--amber);transform:translateX(3px);}
.soon-badge{position:absolute;top:12px;right:12px;font-family:'Caveat',cursive;font-size:13px;background:var(--cream-dark);padding:2px 10px;border-radius:100px;color:var(--ink-muted);border:1px dashed var(--border);}

/* CONSULTANT CARDS */
.consult-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:36px;}
.consult-card{padding:24px;border:1.5px solid var(--border);border-radius:12px;background:var(--cream);transition:all .25s;}
.consult-card:hover{box-shadow:3px 3px 0 var(--amber-light);border-color:var(--amber);transform:translateY(-2px);}
.consult-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-weight:700;font-size:18px;color:#fff;margin-bottom:12px;}
.consult-name{font-family:'Lora',serif;font-weight:600;font-size:16px;color:var(--ink);}
.consult-title{font-size:12px;color:var(--ink-muted);margin:3px 0 10px;}
.consult-tools{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.consult-tool{font-family:'Caveat',cursive;font-size:13px;padding:2px 9px;background:var(--blue-pale);border:1px solid rgba(29,78,216,.15);border-radius:100px;color:var(--blue);}
.consult-meta{font-size:12px;color:var(--ink-muted);margin-bottom:14px;}
.consult-rate{font-weight:500;color:var(--ink);}
.consult-btn{width:100%;padding:9px;background:transparent;border:1.5px solid var(--ink);border-radius:8px;color:var(--ink);font-family:'Caveat',cursive;font-weight:600;font-size:16px;cursor:pointer;transition:all .2s;box-shadow:2px 2px 0 var(--amber-light);}
.consult-btn:hover{background:var(--ink);color:var(--cream);box-shadow:none;}
.contact-form{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.contact-input{background:var(--paper);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.contact-input:focus{border-color:var(--amber);}
.contact-input::placeholder{color:var(--ink-faint);}
.contact-textarea{resize:vertical;min-height:68px;}
.success-msg{background:rgba(77,124,95,.1);border:1.5px solid rgba(77,124,95,.25);border-radius:8px;padding:12px 14px;font-size:13px;color:var(--sage);}

/* CTA SECTION */
.cta-section{background:var(--ink);padding:90px 64px;text-align:center;position:relative;overflow:hidden;}
.cta-section::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(250,247,242,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(250,247,242,.03) 1px,transparent 1px);background-size:40px 40px;}
.cta-section h2{font-family:'Lora',serif;font-size:clamp(26px,4vw,44px);font-weight:600;color:var(--cream);max-width:620px;margin:0 auto 14px;line-height:1.2;letter-spacing:-.5px;position:relative;}
.cta-section h2 em{font-style:italic;color:var(--amber);}
.cta-section p{font-size:16px;color:rgba(250,247,242,.55);margin-bottom:32px;position:relative;}
.cta-actions{display:flex;gap:14px;justify-content:center;position:relative;flex-wrap:wrap;}

/* FOOTER */
footer{background:var(--cream-dark);border-top:1.5px solid var(--border);padding:28px 48px;display:flex;align-items:center;justify-content:space-between;color:var(--ink-muted);font-size:13px;}
.footer-logo{font-family:'Caveat',cursive;font-weight:700;font-size:21px;color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:3px;}
.footer-links{display:flex;gap:22px;}
.footer-links button{background:none;border:none;color:var(--ink-muted);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:color .2s;padding:0;}
.footer-links button:hover{color:var(--ink);}

/* PAGE HERO (interior) */
.page-hero{padding:64px 0 40px;border-bottom:1.5px solid var(--border);background:var(--paper);}
.page-hero-inner{max-width:1160px;margin:0 auto;padding:0 48px;}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:18px;font-family:'Caveat',cursive;font-size:15px;color:var(--ink-muted);}
.breadcrumb button{background:none;border:none;color:var(--ink-muted);font-family:'Caveat',cursive;font-size:15px;cursor:pointer;padding:0;transition:color .2s;}
.breadcrumb button:hover{color:var(--amber);}
.breadcrumb-sep{color:var(--border);}
.page-hero h1{font-family:'Lora',serif;font-size:clamp(26px,4vw,44px);font-weight:600;color:var(--ink);letter-spacing:-.5px;margin-bottom:12px;line-height:1.15;}
.page-hero-sub{color:var(--ink-soft);font-size:16px;line-height:1.65;max-width:600px;margin-bottom:20px;}
.page-stats{display:flex;gap:10px;flex-wrap:wrap;}
.page-stat{font-family:'Caveat',cursive;font-size:15px;color:var(--ink-soft);background:var(--cream);padding:5px 14px;border-radius:100px;border:1.5px solid var(--border);}

/* STACK DIAGRAM */
.stack-body{max-width:1160px;margin:0 auto;padding:40px 48px 80px;}
.diagram-wrap{display:flex;flex-direction:column;gap:0;margin-bottom:48px;}
.section-card{background:var(--paper);border:1.5px solid var(--border);border-radius:12px;padding:22px 26px;position:relative;}
.section-card.c-rust{border-left:4px solid var(--rust);}
.section-card.c-blue{border-left:4px solid var(--blue);}
.section-card.c-amber{border-left:4px solid var(--amber);}
.section-card.c-purple{border-left:4px solid var(--purple);}
.sc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;}
.sc-name{font-family:'Caveat',cursive;font-size:19px;font-weight:700;color:var(--ink);}
.sc-desc{font-size:13px;color:var(--ink-muted);margin-top:2px;}
.sc-badge{flex-shrink:0;font-size:11px;padding:3px 10px;border-radius:20px;border:1px solid;white-space:nowrap;font-family:'DM Sans',sans-serif;font-weight:500;}
.b-rust{background:#FFF7ED;color:var(--rust);border-color:rgba(194,65,12,.3);}
.b-blue{background:var(--blue-pale);color:var(--blue);border-color:rgba(29,78,216,.3);}
.b-amber{background:var(--amber-pale);color:var(--amber);border-color:rgba(217,119,6,.3);}
.b-purple{background:var(--purple-pale);color:var(--purple);border-color:rgba(109,40,217,.3);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.chip{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:6px;font-family:'Caveat',cursive;font-size:15px;font-weight:600;border:1.5px solid;cursor:default;transition:transform .15s;white-space:nowrap;}
.chip:hover{transform:translateY(-1px);}
.chip-d{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ch-rust{background:#FFF7ED;border-color:rgba(194,65,12,.3);color:var(--rust);}.ch-rust .chip-d{background:var(--rust);}
.ch-blue{background:var(--blue-pale);border-color:rgba(29,78,216,.25);color:var(--blue);}.ch-blue .chip-d{background:var(--blue);}
.ch-amber{background:var(--amber-pale);border-color:var(--amber);color:#92400E;border-width:2px;}.ch-amber .chip-d{background:var(--amber);}
.ch-purple{background:var(--purple-pale);border-color:rgba(109,40,217,.25);color:var(--purple);}.ch-purple .chip-d{background:var(--purple);}
.ch-neutral{background:var(--cream-dark);border-color:var(--border);color:var(--ink-soft);}.ch-neutral .chip-d{background:var(--ink-faint);}
.diag-connector{display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 0;}
.conn-line{flex:1;height:1px;background:var(--border);max-width:100px;}
.conn-label{font-family:'Caveat',cursive;font-size:13px;color:var(--ink-faint);font-style:italic;}
.sticky-note{position:absolute;background:var(--amber-light);border:1px solid rgba(217,119,6,.4);border-radius:4px;padding:4px 10px;font-family:'Caveat',cursive;font-size:12px;color:#78350F;box-shadow:2px 2px 0 rgba(217,119,6,.15);white-space:nowrap;z-index:2;}
.tool-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.tool-card{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:18px;transition:border-color .2s;}
.tool-card:hover{border-color:var(--amber);}
.tc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;}
.tc-logo{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-weight:700;font-size:13px;flex-shrink:0;}
.tc-name{font-family:'Lora',serif;font-weight:600;font-size:15px;color:var(--ink);margin-bottom:1px;}
.tc-cat{font-size:11px;color:var(--ink-muted);}
.tc-rating{font-size:12px;color:var(--amber);margin-top:2px;}
.tc-rationale{font-size:13px;color:var(--ink-soft);line-height:1.6;}

const TOOLS_LIST = ['HubSpot','Salesforce','Fivetran','Snowflake','dbt','TapClicks','Segment','Braze','Klaviyo','Monday.com','Looker','Datadog','ActiveCampaign'];
const VERTICALS_LIST = ['Marketing Agency','Media / Publisher','SaaS','eCommerce'];

function JoinModal({ onClose }) {
  const [form, setForm] = useState({name:'',email:'',title:'',tools:[],verticals:[],rateMin:'',rateMax:'',location:'',linkedin:''});
  const [submitted, setSubmitted] = useState(false);
  const [loading, setLoading] = useState(false);
  function toggle(field, val) { setForm(f=>({...f,[field]:f[field].includes(val)?f[field].filter(x=>x!==val):[...f[field],val]})); }
  async function submit(e) {
    e.preventDefault();
    setLoading(true);
    try {
      await fetch('https://formspree.io/f/xjganrzn', {
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
        body: JSON.stringify({...form, tools: form.tools.join(', '), verticals: form.verticals.join(', ')}),
      });
    } catch(_) {}
    setLoading(false);
    setSubmitted(true);
  }
  if (submitted) return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={{textAlign:'center',padding:'48px 36px'}}>
        <button className="modal-close" onClick={onClose}>×</button>
        <div style={{fontSize:48,marginBottom:16}}>✓</div>
        <h2 style={{marginBottom:8}}>Application received!</h2>
        <p className="modal-sub">We'll review your profile and be in touch within 48 hours.</p>
        <button className="btn-primary" onClick={onClose} style={{marginTop:20}}>Done →</button>
      </div>
    </div>
  );
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}>×</button>
        <h2>Get listed on SaaSMatchup</h2>
        <p className="modal-sub">Free to join. We review every application and match you with buyers who need your exact expertise.</p>
        <form onSubmit={submit}>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Full name</label><input className="form-input" placeholder="Your name" value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} required /></div>
            <div className="form-group"><label className="form-label">Work email</label><input className="form-input" type="email" placeholder="you@company.com" value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} required /></div>
          </div>
          <div className="form-group"><label className="form-label">Title / specialty</label><input className="form-input" placeholder="e.g. HubSpot & RevOps Consultant" value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} required /></div>
          <div className="form-group">
            <label className="form-label">Tools you work with</label>
            <div className="checkbox-grid">{TOOLS_LIST.map(t=><div key={t} className={`checkbox-item${form.tools.includes(t)?' checked':''}`} onClick={()=>toggle('tools',t)}>{t}</div>)}</div>
          </div>
          <div className="form-group">
            <label className="form-label">Verticals</label>
            <div className="checkbox-grid">{VERTICALS_LIST.map(v=><div key={v} className={`checkbox-item${form.verticals.includes(v)?' checked':''}`} onClick={()=>toggle('verticals',v)}>{v}</div>)}</div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Rate min ($/hr)</label><input className="form-input" placeholder="e.g. 150" value={form.rateMin} onChange={e=>setForm(f=>({...f,rateMin:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">Rate max ($/hr)</label><input className="form-input" placeholder="e.g. 250" value={form.rateMax} onChange={e=>setForm(f=>({...f,rateMax:e.target.value}))} /></div>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Location</label><input className="form-input" placeholder="City or Remote" value={form.location} onChange={e=>setForm(f=>({...f,location:e.target.value}))} /></div>
            <div className="form-group"><label className="form-label">LinkedIn URL</label><input className="form-input" placeholder="linkedin.com/in/..." value={form.linkedin} onChange={e=>setForm(f=>({...f,linkedin:e.target.value}))} /></div>
          </div>
          <button type="submit" className="btn-primary" style={{width:'100%',justifyContent:'center',marginTop:8}} disabled={loading}>{loading ? 'Submitting…' : 'Submit Application →'}</button>
        </form>
      </div>
    </div>
  );
}

          <div style={{fontFamily:"'Caveat',cursive",fontSize:15,color:'var(--ink-muted)',marginBottom:8}}>Filter by vertical</div>
          <div className="filter-bar">{verticals.map(v=><button key={v} className={`filter-pill${vertical===v?' active':''}`} onClick={()=>setVertical(v)}>{v}</button>)}</div>
        </div>
        <div style={{marginBottom:28}}>
          <div style={{fontFamily:"'Caveat',cursive",fontSize:15,color:'var(--ink-muted)',marginBottom:8}}>Filter by tool</div>
          <div className="filter-bar">{toolFilters.map(t=><button key={t} className={`filter-pill${tool===t?' active':''}`} onClick={()=>setTool(t)}>{t}</button>)}</div>
        </div>
        <div style={{fontFamily:"'Caveat',cursive",fontSize:16,color:'var(--ink-muted)',marginBottom:20}}>{filtered.length} consultant{filtered.length!==1?'s':''} found</div>
        <div className="consult-grid-4">
          {filtered.map(c=><ConsultantCard key={c.id} c={c} />)}
          {filtered.length===0 && <div style={{color:'var(--ink-muted)',padding:'40px 0',fontFamily:"'Caveat',cursive",fontSize:18}}>No consultants match — try clearing a filter.</div>}
        </div>
      </div>
    </div>
  );
}

// ─── QUIZ PAGE ─────────────────────────────────────────────────────────────────
function QuizPage({ navigate }) {
  const [step, setStep] = useState(1);
  const [answers, setAnswers] = useState({type:'',size:'',budget:'',pain:[],email:''});
  const [result, setResult] = useState(null);
  const [emailSent, setEmailSent] = useState(false);

  function selectOpt(field, val) { setAnswers(a=>({...a,[field]:val})); setTimeout(()=>setStep(s=>s+1),300); }
  function togglePain(val) { setAnswers(a=>({...a,pain:a.pain.includes(val)?a.pain.filter(x=>x!==val):[...a.pain,val]})); }
  function generate() { setResult(computeStack(answers)); }

  if (result) return (
    <div className="page" style={{background:'var(--paper)'}}>
      <div className="result-wrap">
        <div className="result-header">
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <h2>{result.name}</h2>
          <p>Optimised for a {answers.size} {answers.type} · {result.total} estimated</p>
        </div>
        {result.layers.map((layer,i)=>(
          <div key={i} className="result-layer">
            <div className="result-layer-name">{layer.name}</div>
            {layer.tools.map(t=>(
              <div key={t.name} className="result-tool-row">
                <div className="result-tool-left">
                  <div className="result-tool-logo" style={{color:t.color}}>{t.abbr}</div>
                  <div>
                    <div className="result-tool-name">{t.name}</div>
                    <div className="result-tool-why">{t.why}</div>
                  </div>
                </div>
                <div className="result-tool-cost">{t.cost}</div>
              </div>
            ))}
          </div>
        ))}
        <div className="result-total">
          <span>Estimated monthly total</span>
          <strong>{result.total}</strong>
        </div>
        <div className="result-actions">
          {!emailSent
            ? <button className="btn-primary" style={{justifyContent:'center'}} onClick={()=>setEmailSent(true)}>📧 Email Me This Stack</button>
            : <div className="success-msg">✓ Stack sent to {answers.email}! Check your inbox.</div>
          }
          <button className="btn-outline" style={{justifyContent:'center'}} onClick={()=>navigate('/consultants')}>Find a consultant for this stack →</button>
          <button className="btn-text" style={{justifyContent:'center'}} onClick={()=>{setResult(null);setStep(1);setAnswers({type:'',size:'',budget:'',pain:[],email:''});setEmailSent(false);}}>← Retake quiz</button>
        </div>
      </div>
    </div>
  );

  return (
    <div className="quiz-page">
      <div className="quiz-card">
        <div className="quiz-eyebrow">AI Stack Builder</div>
        <div className="quiz-main-title">Get your stack in 90 seconds</div>
        <div className="quiz-progress">
          {[1,2,3,4,5].map(d=><div key={d} className={`quiz-dot${step>d?' done':step===d?' active':''}`}></div>)}
        </div>
        {step===1 && (
          <div>
            <div className="quiz-q">What type of company are you?</div>
            <div className="quiz-opts">
              {[{i:'📣',l:'Marketing Agency'},{i:'📰',l:'Media / Publisher'},{i:'🚀',l:'SaaS Company'},{i:'🛒',l:'eCommerce'}].map(o=>(
                <button key={o.l} className={`quiz-opt${answers.type===o.l?' sel':''}`} onClick={()=>selectOpt('type',o.l)}>
                  <span className="quiz-opt-icon">{o.i}</span>{o.l}
                </button>
              ))}
            </div>
          </div>
        )}
        {step===2 && (
          <div>
            <div className="quiz-q">How big is your team?</div>
            <div className="quiz-opts">
              {['1–10 people','11–50 people','51–200 people','200+ people'].map(o=>(
                <button key={o} className={`quiz-opt${answers.size===o?' sel':''}`} onClick={()=>selectOpt('size',o)}>{o}</button>
              ))}
            </div>
          </div>
        )}
        {step===3 && (
          <div>
            <div className="quiz-q">What's your annual SaaS budget?</div>
            <div className="quiz-opts">
              {['Under $50k','$50k – $200k','$200k – $500k','$500k+'].map(o=>(
                <button key={o} className={`quiz-opt${answers.budget===o?' sel':''}`} onClick={()=>selectOpt('budget',o)}>{o}</button>
              ))}
            </div>
          </div>
        )}
        {step===4 && (
          <div>
            <div className="quiz-q">Biggest pain points?</div>
            <div className="quiz-hint">Select all that apply</div>
            <div className="quiz-checks">
              {['Client reporting is a mess','Too many disconnected tools','Poor attribution / ROI tracking','Scaling without more headcount','Poor data visibility','Finance / billing ops'].map(o=>(
                <div key={o} className={`quiz-check${answers.pain.includes(o)?' sel':''}`} onClick={()=>togglePain(o)}>
                  <div className="quiz-check-box">{answers.pain.includes(o)&&<span style={{color:'#fff',fontSize:11}}>✓</span>}</div>
                  <div className="quiz-check-label">{o}</div>
                </div>
              ))}
            </div>
            <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={()=>setStep(5)}>Continue →</button>
          </div>
        )}
        {step===5 && (
          <div>
            <div className="quiz-q">Almost there — see your stack now</div>
            <div className="quiz-hint">We'll email you the full recommendation with cost breakdowns.</div>
            <input className="quiz-email-input" type="email" placeholder="Enter your work email" value={answers.email} onChange={e=>setAnswers(a=>({...a,email:e.target.value}))} />
            <button className="btn-primary" style={{width:'100%',justifyContent:'center'}} onClick={generate}>✦ Generate My Stack →</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ROUTER ───────────────────────────────────────────────────────────────
function getRoute() {
  const h = window.location.hash;
  if (!h || h==='#' || h==='#/') return '/';
  return h.slice(1);
}

function App() {
  const [route, setRoute] = useState(getRoute);
  useEffect(()=>{
    const onHash = ()=>{ setRoute(getRoute()); window.scrollTo(0,0); };
    window.addEventListener('hashchange', onHash);
    return ()=>window.removeEventListener('hashchange', onHash);
  },[]);
  const navigate = (path)=>{ window.location.hash = path; };
  function renderPage() {
    if (route==='/') return <HomePage navigate={navigate} />;
    if (route.startsWith('/stacks/')) return <StackDetailPage slug={route.split('/')[2]} navigate={navigate} />;
    if (route==='/consultants') return <ConsultantsPage navigate={navigate} />;
    if (route==='/quiz') return <QuizPage navigate={navigate} />;
    return <HomePage navigate={navigate} />;
  }
  return (
    <div>
      <Nav navigate={navigate} route={route} />
      {renderPage()}
      <Footer navigate={navigate} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
